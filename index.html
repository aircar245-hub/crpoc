<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moder的个人学习空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cyber-purple: #8b5cf6;
            --cyber-pink: #ec4899;
            --cyber-blue: #06b6d4;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.8);
            --text-glow: rgba(139, 92, 246, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* 粒子背景 Canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--cyber-purple), var(--cyber-pink), var(--cyber-blue), var(--cyber-purple));
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite, flicker 2s infinite alternate;
            text-shadow: 0 0 10px var(--text-glow);
        }

        @keyframes shine {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px var(--cyber-purple)); }
            50% { opacity: 0.9; filter: drop-shadow(0 0 15px var(--cyber-pink)); }
        }

        /* 主内容区 */
        .main-content {
            padding-top: 120px;
            position: relative;
            z-index: 1;
        }

        /* 第一区域 */
        .hero {
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--cyber-purple);
            text-shadow: 0 0 10px var(--text-glow);
        }

        .typewriter {
            font-size: 1.2rem;
            color: var(--cyber-blue);
            border-right: 2px solid var(--cyber-blue);
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* 学习卡片区 - 田字格 */
        .cards-section {
            padding: 2rem 5%;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.1), transparent);
            transition: left 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--cyber-pink);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.3);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--cyber-purple), var(--cyber-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card h3 {
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .card p {
            color: #aaa;
            margin-bottom: 1.5rem;
        }

        .card-btn {
            padding: 0.8rem 2rem;
            background: transparent;
            border: 1px solid var(--cyber-purple);
            color: var(--cyber-purple);
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .card-btn:hover {
            background: var(--cyber-purple);
            color: #000;
            box-shadow: 0 0 15px var(--cyber-purple);
        }

        /* 社区交流区 */
        .community-section {
            padding: 4rem 5%;
            max-width: 800px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--cyber-blue);
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        .post {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyber-purple), var(--cyber-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .post-content h4 {
            color: var(--cyber-pink);
            margin-bottom: 0.3rem;
        }

        .post-meta {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .post-text {
            color: #ccc;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            color: #888;
            margin-top: 2rem;
        }

        .footer-link {
            color: var(--cyber-blue);
            text-decoration: none;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .footer-link:hover {
            text-shadow: 0 0 10px var(--cyber-blue);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .logo {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- 粒子背景 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 导航栏 -->
    <nav>
        <div class="logo">Moder Study Website</div>
    </nav>

    <div class="main-content">
        <!-- 第一区域 -->
        <section class="hero">
            <h1>因为学的东西太多，就拿AI搭个学习网站了~</h1>
            <div class="typewriter" id="typewriter"></div>
        </section>

        <!-- 学习卡片区 -->
        <section class="cards-section">
            <div class="cards-grid">
                <!-- 卡片1：微积分 -->
                <div class="card">
                    <div class="card-icon">
                        <i class="fas fa-integral"></i>
                    </div>
                    <h3>微积分专区</h3>
                    <p>微积分疑难杂症根治</p>
                    <button class="card-btn" data-url="./weijifen.html">点击进入</button>
                </div>

                <!-- 卡片2：C语言 -->
                <div class="card">
                    <div class="card-icon">
                        <i class="fab fa-cuttlefish"></i>
                    </div>
                    <h3>C语言专区</h3>
                    <p>依旧努力学习C语言</p>
                    <button class="card-btn" data-url="./C.html">点击进入</button>
                </div>

                <!-- 卡片3：网安 -->
                <div class="card">
                    <div class="card-icon">
                        <i class="fas fa-shield-halved"></i>
                    </div>
                    <h3>网安专区</h3>
                    <p>我不会</p>
                    <button class="card-btn" data-url="./CTF.html">点击进入</button>
                </div>

                <!-- 卡片4：前端 -->
                <div class="card">
                    <div class="card-icon">
                        <i class="fab fa-html5"></i>
                    </div>
                    <h3>前端专区</h3>
                    <p>我也不会</p>
                    <button class="card-btn" data-url="./qianduan.html">点击进入</button>
                </div>
            </div>
        </section>

        <!-- 社区交流区 -->
        <section class="community-section">
            <h2 class="section-title">社区交流区</h2>
            
            <div class="post">
                <div class="avatar">M</div>
                <div class="post-content">
                    <h4>Moder</h4>
                    <div class="post-meta">10分钟前</div>
                    <p class="post-text">今天的微积分又学废了，有没有大佬带带我...</p>
                </div>
            </div>

            <div class="post">
                <div class="avatar">X</div>
                <div class="post-content">
                    <h4>学神小王</h4>
                    <div class="post-meta">30分钟前</div>
                    <p class="post-text">推荐大家去看3Blue1Brown的微积分视频，讲得超级好！</p>
                </div>
            </div>

            <div class="post">
                <div class="avatar">L</div>
                <div class="post-content">
                    <h4>CTF新手</h4>
                    <div class="post-meta">2小时前</div>
                    <p class="post-text">刚入门Web安全，有没有一起刷题的伙伴？</p>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer>
            <p>@MODER 非常好网页使我的大脑旋转</p>
            <a href="https://waterlm.xyz" target="_blank" class="footer-link">waterlm.xyz</a>
        </footer>
    </div>

    <script>
        // --- 1. 粒子背景系统 ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = Math.random() * 30 + 1;
                this.speed = 0.02;
            }

            draw() {
                ctx.fillStyle = 'rgba(139, 92, 246, 0.6)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                // 鼠标排斥效果
                if (mouse.x && mouse.y) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let maxDistance = mouse.radius;
                    let force = (maxDistance - distance) / maxDistance;
                    
                    if (distance < maxDistance) {
                        this.x -= forceDirectionX * force * this.density;
                        this.y -= forceDirectionY * force * this.density;
                    }
                }

                // 缓慢回到原位
                if (this.x !== this.baseX) {
                    let dx = this.x - this.baseX;
                    this.x -= dx * this.speed;
                }
                if (this.y !== this.baseY) {
                    let dy = this.y - this.baseY;
                    this.y -= dy * this.speed;
                }
            }
        }

        function initParticles() {
            particles = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let particle of particles) {
                particle.draw();
                particle.update();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // --- 2. 打字机特效 ---
        const text = "希望有用呢";
        const typewriterEl = document.getElementById('typewriter');
        let index = 0;

        function type() {
            if (index < text.length) {
                typewriterEl.textContent += text.charAt(index);
                index++;
                setTimeout(type, 200);
            }
        }
        setTimeout(type, 500);

        // --- 3. 按钮点击跳转事件 ---
        document.querySelectorAll('.card-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const url = this.getAttribute('data-url');
                window.location.href = url;
            });
        });

        // --- 4. 平滑滚动 ---
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
